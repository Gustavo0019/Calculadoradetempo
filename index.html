<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icone.png" type="image/png">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Calculadora de tempo</title>
<style>
:root{--bg-samsung:#f2f2f2;--btn-op:#e3e3e3;--btn-num:#ffffff;--accent-green:#00a562;--text-dark:#000000;--text-muted:#5e5e5e;--border-gray:#d1d1d1}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#e8eaed;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;height:100vh;height:100dvh;overflow:hidden;display:flex;justify-content:center;align-items:center}

.app{width:100%;max-width:430px;height:100vh;height:100dvh;background:var(--bg-samsung);display:flex;flex-direction:column;position:relative;overflow:hidden}
@media(min-width:480px) and (min-height:500px){
    .app{height:90vh;max-height:820px;border-radius:24px;box-shadow:0 12px 40px rgba(0,0,0,0.08)}
}

.display-section{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:16px 28px;position:relative;min-height:160px;overflow:hidden}
.top-bar{position:absolute;top:20px;left:28px;right:28px;display:flex;justify-content:space-between;align-items:center;z-index:30}
.icon-btn{background:none;border:none;cursor:pointer;padding:8px;display:flex;align-items:center;justify-content:center;transition:opacity 0.2s}
.icon-btn.disabled{opacity:0.35;cursor:default}
.icon-btn svg{fill:none;stroke:var(--text-dark);stroke-width:2.0;stroke-linecap:round;stroke-linejoin:round;width:24px;height:24px}

.expr-container{width:100%;max-height:95px;overflow-y:auto;display:flex;align-items:center;justify-content:flex-start;margin-bottom:8px}
#expr{font-size:42px;font-weight:300;color:var(--text-dark);word-break:break-word;outline:none;caret-color:var(--accent-green);width:100%;text-align:left;line-height:1.1;min-height:48px}
#result{font-size:24px;color:var(--text-muted);min-height:30px;text-align:left;font-weight:400;width:100%}

.keyboard-section{padding:0 20px 24px 20px;background:var(--bg-samsung);user-select:none;position:relative;display:flex;flex-direction:column}
.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;width:100%;position:relative}
button.calc-btn{border:none;border-radius:50%;width:100%;aspect-ratio:1;font-size:26px;font-weight:400;background:var(--btn-num);color:var(--text-dark);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(0,0,0,0.03);z-index:2}
button.calc-btn:active{filter:brightness(0.9)}
button.op{background:var(--btn-op);color:var(--accent-green);font-size:28px}
button.eq{background:var(--accent-green);color:#fff;font-size:32px;z-index:26}
button.c-btn{color:#d9534f;font-weight:500}

.unit-row{grid-column:span 4;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:2px}
.unit-btn{background:var(--btn-op);border-radius:30px!important;height:46px!important;aspect-ratio:auto!important;color:var(--text-dark)!important;font-size:16px!important;font-weight:500!important}

#history-pane{display:flex;flex-direction:column;position:absolute;top:0;left:-75%;width:75%;height:100%;background:var(--bg-samsung);z-index:25;transition:left 0.22s cubic-bezier(0.4,0,0.2,1);padding:8px 0px 8px 4px;border-right:1px solid var(--border-gray)}
#history-pane.open{left:0}
.hist-header-space{flex:1;max-height:calc(100% - 50px);overflow-y:auto;display:flex;flex-direction:column;justify-content:flex-end;margin-bottom:8px;margin-right:4px}
#history-list{overflow-y:auto;width:100%}
.hist-item{padding:12px 16px 12px 8px;text-align:right;font-size:16px;color:var(--text-muted);cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.03)}
.hist-item .h-exp{color:var(--text-dark);font-size:18px;margin-bottom:4px;word-break:break-all}
.hist-item .h-res{color:var(--accent-green);font-weight:500;font-size:16px}
.hist-footer{display:flex;justify-content:center;align-items:center;height:48px;padding:0 12px 0 6px}
.hist-clear-btn{background:var(--btn-op);border:none;color:var(--text-dark);font-size:15px;font-weight:600;padding:12px 0;width:100%;border-radius:24px;cursor:pointer;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,0.02)}
.hist-clear-btn:active{filter:brightness(0.88)}

@media(max-height:680px){
    .buttons{gap:10px}
    .unit-row{gap:10px}
    button.calc-btn{font-size:22px}
    .unit-btn{height:40px!important;font-size:15px!important}
    .display-section{padding:14px 24px; min-height: 120px}
    #expr{font-size:36px}
}
</style>
</head>
<body>
<div class="app">
<div class="top-bar">
<button class="icon-btn disabled" id="toggle-btn" onclick="toggleHist()" title="Histórico">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="9"></circle>
<polyline points="12 7 12 12 15 14"></polyline>
</svg>
</button>
</div>

<div class="display-section">
<div class="expr-container">
<div id="expr" contenteditable="true" inputmode="none"></div>
</div>
<div id="result"></div>
</div>

<div class="keyboard-section">
<div id="history-pane">
<div class="hist-header-space">
<div id="history-list"></div>
</div>
<div class="hist-footer">
<button class="hist-clear-btn" onclick="clearHist()">Limpar histórico</button>
</div>
</div>

<div class="buttons">
<button class="calc-btn c-btn" onclick="clearExpr()" id="cabtn">C</button>
<button class="calc-btn op" style="color:var(--text-dark)" onclick="back()">⌫</button>
<button class="calc-btn op" onclick="addOp('%')">%</button>
<button class="calc-btn op" onclick="addOp(' ÷ ')">÷</button>

<button class="calc-btn" onclick="addNum('7')">7</button>
<button class="calc-btn" onclick="addNum('8')">8</button>
<button class="calc-btn" onclick="addNum('9')">9</button>
<button class="calc-btn op" onclick="addOp(' × ')">×</button>

<button class="calc-btn" onclick="addNum('4')">4</button>
<button class="calc-btn" onclick="addNum('5')">5</button>
<button class="calc-btn" onclick="addNum('6')">6</button>
<button class="calc-btn op" onclick="addOp(' - ')">−</button>

<button class="calc-btn" onclick="addNum('1')">1</button>
<button class="calc-btn" onclick="addNum('2')">2</button>
<button class="calc-btn" onclick="addNum('3')">3</button>
<button class="calc-btn op" onclick="addOp(' + ')">+</button>

<button class="calc-btn" style="color:var(--text-muted); font-weight:300" onclick="paren()">( )</button>
<button class="calc-btn" onclick="addNum('0')">0</button>
<button class="calc-btn" style="color:var(--text-dark)" onclick="addComma()">,</button>
<button class="calc-btn eq" onclick="calc()">=</button>

<div class="unit-row">
<button class="calc-btn unit-btn" onclick="addUnit('h')">h</button>
<button class="calc-btn unit-btn" onclick="addUnit('min')">min</button>
<button class="calc-btn unit-btn" onclick="addUnit('s')">s</button>
<button class="calc-btn unit-btn" onclick="addUnit('d')">d</button>
</div>
</div>
</div>
</div>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
    });
}

const exprEl = document.getElementById("expr");
let isHistOpen = false;
let clearOnNextInput = false;

function getCaretPosition() {
    let select = window.getSelection();
    if (!select.rangeCount) return 0;
    let range = select.getRangeAt(0);
    let clone = range.cloneRange();
    clone.selectNodeContents(exprEl);
    clone.setEnd(range.endContainer, range.endOffset);
    return clone.toString().length;
}

function setCaretPosition(pos) {
    let textNode = exprEl.firstChild;
    if (!textNode) return;
    let range = document.createRange();
    let sel = window.getSelection();
    pos = Math.max(0, Math.min(pos, textNode.length));
    range.setStart(textNode, pos);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
}

function insertAtCaret(text) {
    exprEl.focus();
    checkChainResult(false);
    let sel = window.getSelection();
    if (!sel.rangeCount) return;
    let range = sel.getRangeAt(0);
    range.deleteContents();
    let node = document.createTextNode(text);
    range.insertNode(node);
    range.setStartAfter(node);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
    render();
    liveCalc();
}

function checkChainResult(isOperator) {
    if (clearOnNextInput) {
        clearOnNextInput = false;
        let currentText = exprEl.innerText.trim();
        if (isOperator && currentText && !currentText.includes(' = ')) {
            result("");
            setCaretPosition(currentText.length);
        } else {
            exprEl.innerText = "";
            result("");
        }
    }
}

function formatThousands(numStr) {
    if (!numStr) return "";
    let parts = numStr.split(',');
    let intPart = parts[0].replace(/\./g, '');
    let decPart = parts.length > 1 ? ',' + parts[1] : '';
    let formattedInt = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    return formattedInt + decPart;
}

function cleanDisplayFormatting(str) {
    return str.replace(/\./g, '');
}

function render() {
    let pos = getCaretPosition();
    let currentText = exprEl.innerText;
    let cleanedText = currentText.replace(/[^0-9+\-×÷%(),\.\sadhmsin]/g, '');
    
    if (currentText !== cleanedText) {
        exprEl.innerText = cleanedText;
        currentText = cleanedText;
    }
    
    let formatted = formatExpr(currentText);
    if (currentText !== formatted) {
        exprEl.innerText = formatted;
        setCaretPosition(pos + (formatted.length - currentText.length));
    }
}

function addNum(n) {
    checkChainResult(false);
    let text = exprEl.innerText;
    let pos = getCaretPosition();
    let left = text.slice(0, pos);
    
    if (n === '0') {
        let matchToken = left.match(/[\d,.]+$/);
        if (matchToken) {
            let currentNumStr = cleanDisplayFormatting(matchToken[0]);
            if (currentNumStr === '0') return; 
        }
    }
    insertAtCaret(n);
}

function addOp(op) {
    checkChainResult(true);
    let text = exprEl.innerText;
    let pos = getCaretPosition();
    let leftText = text.slice(0, pos).trim();
    if (!leftText) return;
    
    if (op === '%') {
        insertAtCaret('%');
        return;
    }

    if (/[+\-×÷]$/.test(leftText)) {
        let cleanLeft = text.slice(0, pos).replace(/\s*[+\-×÷]\s*$/, '');
        exprEl.innerText = cleanLeft + op + text.slice(pos);
        setCaretPosition(cleanLeft.length + op.length);
        render();
        liveCalc();
        return;
    }
    insertAtCaret(op);
}

function addComma() {
    checkChainResult(false);
    let text = exprEl.innerText;
    let pos = getCaretPosition();
    let left = text.slice(0, pos);
    let currentNumMatch = left.replace(/\./g, '').match(/[\d,]*$/);
    if (currentNumMatch && currentNumMatch[0].includes(',')) return;
    
    let leftTrimmed = left.trim();
    if (!leftTrimmed || /[+\-×÷(%]$/.test(leftTrimmed)) { 
        insertAtCaret("0,"); 
    } else { 
        if (/\s+$/.test(left)) {
            exprEl.innerText = leftTrimmed + "," + text.slice(pos);
            setCaretPosition(leftTrimmed.length + 1);
            render();
            liveCalc();
        } else {
            insertAtCaret(","); 
        }
    }
}

function addUnit(u) {
    checkChainResult(false);
    let text = exprEl.innerText;
    let pos = getCaretPosition();
    let left = text.slice(0, pos);
    
    let isConversionArea = false;
    let lastPctIndex = left.lastIndexOf('%');
    if (lastPctIndex !== -1) {
        let beforePct = left.slice(0, lastPctIndex);
        if (/[a-z]\s*$/i.test(beforePct)) isConversionArea = true;
    }

    if (isConversionArea) {
        let lastWord = left.trim().split(/\s+/).pop();
        if (lastWord.toLowerCase() === u.toLowerCase()) return; 
        insertAtCaret(" " + u);
        return;
    }

    let matchUnit = left.match(/\s*(d|h|min|s)\s*$/i);
    if (matchUnit) {
        let cleanLeft = left.substring(0, left.length - matchUnit[0].length);
        exprEl.innerText = cleanLeft + " " + u + " " + text.slice(pos);
        setCaretPosition(cleanLeft.length + u.length + 2);
        render();
        liveCalc();
        return;
    }

    let leftText = left.trim();
    if (!leftText) return;
    let lastChar = leftText.slice(-1);
    if (/[0-9%]/.test(lastChar)) {
        let l = text.slice(0, pos).replace(/\s*$/, '');
        let r = text.slice(pos);
        exprEl.innerText = l + " " + u + " " + r;
        setCaretPosition(l.length + u.length + 2);
        render();
        liveCalc();
    }
}

function back() {
    exprEl.focus();
    if (clearOnNextInput) { clearOnNextInput = false; exprEl.innerText = ""; result(""); return; }
    let sel = window.getSelection();
    if (!sel.rangeCount) return;
    let range = sel.getRangeAt(0);
    if (!range.collapsed) { range.deleteContents(); render(); liveCalc(); return; }
    let pos = getCaretPosition();
    let text = exprEl.innerText;
    if (pos === 0) return;
    
    let left = text.slice(0, pos);
    let right = text.slice(pos);
    if (left.endsWith("min ")) { left = left.slice(0, -4); } 
    else if (left.endsWith("min")) { left = left.slice(0, -3); } 
    else if (left.endsWith(" ")) { left = left.slice(0, -2); } 
    else { left = left.slice(0, -1); }
    if (left.endsWith(" ")) { left = left.trimEnd(); }

    exprEl.innerText = left + right;
    setCaretPosition(left.length);
    render();
    liveCalc();
}

function clearExpr() { exprEl.innerText = ""; result(""); exprEl.focus(); clearOnNextInput = false; }
function result(t) { document.getElementById("result").innerText = t; }

function paren() {
    checkChainResult(false);
    let text = exprEl.innerText;
    let o = (text.match(/\(/g) || []).length;
    let c = (text.match(/\)/g) || []).length;
    let pos = getCaretPosition();
    let left = text.slice(0, pos).trim();
    if (o === c || /[+\-×÷(%]$/.test(left) || !left) { insertAtCaret("("); } else { insertAtCaret(")"); }
}

function formatExpr(s) {
    s = s.replace(/[\d\.]+(,\d*)?/g, m => formatThousands(m));
    s = s.replace(/\s+,/g, ",");

    s = s.replace(/(\d+)\s*([a-zA-Z]+)/gi, (m, g1, g2) => {
        if (g2.toLowerCase() === 'min') return g1 + " min";
        return g1 + " " + g2[0];
    });
    s = s.replace(/(min|h|d|s)\s*(\d+)/gi, "$1 $2");
    
    s = s.replace(/\s*%\s*/g, "%");
    s = s.replace(/(\d+)%/g, "$1%");
    s = s.replace(/([a-z])%/gi, "$1 % ");
    s = s.replace(/%([a-z])/gi, "% $1");
    
    s = s.replace(/\s*([+\-×÷])\s*/g, " $1 ");
    s = s.replace(/\s+/g, " ");
    return s.trim();
}

function validateSyntax(expr) {
    let hasUnit = /[a-z]/i.test(expr);
    if (hasUnit) {
        if (expr.includes('×')) {
            let sides = expr.split(/\s*×\s*/);
            if (sides.length >= 2) {
                let unitsFound = 0;
                for (let side of sides) {
                    if (/[a-z]/i.test(side) && !side.includes('%')) unitsFound++;
                }
                if (unitsFound >= 2) return false; 
            }
        }
        if (/[+\-]/.test(expr) && !/[a-z]\s*%\s*[a-z]/i.test(expr)) {
            let tokens = expr.split(/\s*[+\-]\s*/);
            for (let t of tokens) {
                let cleanT = cleanDisplayFormatting(t.trim());
                if (!cleanT || cleanT === '(' || cleanT === ')') continue;
                if (!/[a-z%]/i.test(cleanT) && /^[\d,.\s()×÷]+$/.test(cleanT)) {
                    return false; 
                }
            }
        }
    }
    return true;
}

function convertMonomials(str) {
    return str.replace(/((?:\d+(?:\.\d+)?\s*(?:d|h|min|s)\s*)+)/g, m => {
        let sec = 0;
        let matches = m.matchAll(/(\d+(?:\.\d+)?)\s*(d|h|min|s)/g);
        for (let match of matches) {
            let n = parseFloat(match[1]);
            let u = match[2];
            if (u == "d") sec += n * 86400;
            if (u == "h") sec += n * 3600;
            if (u == "min") sec += n * 60;
            if (u == "s") sec += n;
        }
        return "(" + sec + ")";
    });
}

function preprocess(s) {
    s = cleanDisplayFormatting(s);
    s = s.replace(/,/g, ".");
    s = s.replace(/÷/g, "/").replace(/×/g, "*");
    s = convertMonomials(s);
    return s;
}

function roundSamsung(num) {
    return Math.round(num * 10000000000) / 10000000000;
}

function fmtSamsungStr(num) {
    let rounded = roundSamsung(num).toString().replace('.', ',');
    return formatThousands(rounded);
}

function fmt(sec, mode) {
    if (mode === 'pure') return fmtSamsungStr(sec);
    let neg = sec < 0; sec = Math.abs(sec);
    
    if (mode === 'force_h') {
        let h = Math.floor(sec / 3600); sec -= h * 3600;
        let m = Math.floor(sec / 60); sec -= m * 60;
        let s = Math.round(sec);
        if (s == 60) { s = 0; m++ } if (m == 60) { m = 0; h++ }
        let out = [];
        if (h) out.push(fmtSamsungStr(h) + " h"); if (m) out.push(fmtSamsungStr(m) + " min"); if (s) out.push(fmtSamsungStr(s) + " s");
        return (neg ? "-" : "") + (out.join(" ") || "0 s");
    }

    let d = Math.floor(sec / 86400); sec -= d * 86400;
    let h = Math.floor(sec / 3600); sec -= h * 3600;
    let m = Math.floor(sec / 60); sec -= m * 60;
    let s = Math.round(sec);
    if (s == 60) { s = 0; m++ } if (m == 60) { m = 0; h++ } if (h == 24) { h = 0; d++ }
    let out = [];
    if (d) out.push(fmtSamsungStr(d) + " d"); if (h) out.push(fmtSamsungStr(h) + " h"); if (m) out.push(fmtSamsungStr(m) + " min"); if (s) out.push(fmtSamsungStr(s) + " s");
    return (neg ? "-" : "") + (out.join(" ") || "0 s");
}

function executeEngine(expr) {
    if (!validateSyntax(expr)) return { err: true };

    if (/[a-z]\s*%\s*[a-z]/i.test(expr)) {
        let parts = expr.split(/\s*%\s*/);
        let baseExpr = parts[0].trim();
        let targetUnits = parts[1].trim().toLowerCase().split(/\s+/);
        
        try {
            let sec = Function("return " + preprocess(baseExpr))();
            let outParts = [];
            let remSec = sec;

            for (let i = 0; i < targetUnits.length; i++) {
                let u = targetUnits[i];
                let isLast = (i === targetUnits.length - 1);

                if (u === 'd') {
                    let d = isLast ? remSec / 86400 : Math.floor(remSec / 86400);
                    remSec -= Math.floor(remSec / 86400) * 86400;
                    if (!isLast && d === 0) continue;
                    outParts.push(fmtSamsungStr(d) + " d");
                } else if (u === 'h') {
                    let h = isLast ? remSec / 3600 : Math.floor(remSec / 3600);
                    remSec -= Math.floor(remSec / 3600) * 3600;
                    if (!isLast && h === 0) continue;
                    outParts.push(fmtSamsungStr(h) + " h");
                } else if (u === 'min') {
                    let m = isLast ? remSec / 60 : Math.floor(remSec / 60);
                    remSec -= Math.floor(remSec / 60) * 60;
                    if (!isLast && m === 0) continue;
                    outParts.push(fmtSamsungStr(m) + " min");
                } else if (u === 's') {
                    outParts.push(fmtSamsungStr(remSec) + " s");
                }
            }
            return { val: outParts.join(" ") || ("0 " + targetUnits[targetUnits.length-1]), isPure: true };
        } catch (e) { return { err: true }; }
    }

    if (expr.includes('%')) {
        let clean = cleanDisplayFormatting(expr);
        clean = clean.replace(/(\d+(?:\.\d+)?)\s*%/g, "($1/100)");
        expr = clean;
    }

    let hasUnit = /[a-z]/i.test(expr);
    let hasOp = /[+\-×÷\*\/]/.test(expr);

    if (expr.includes('÷')) {
        let sides = expr.split(/\s*÷\s*/);
        if (sides.length === 2 && /[a-z]/i.test(sides[0]) && /[a-z]/i.test(sides[1])) {
            let v1 = Function("return " + preprocess(sides[0]))();
            let v2 = Function("return " + preprocess(sides[1]))();
            return { val: fmtSamsungStr(v1 / v2), isPure: true };
        }
    }

    if (hasUnit && !hasOp && !expr.includes('%')) {
        try {
            let sec = Function("return " + preprocess(expr))();
            if (/^\s*[\d,.]+\s*d\s*$/i.test(expr)) {
                 return { val: fmtSamsungStr(sec / 3600) + " h", isSingleConversion: true }; 
            }
            let isExpandable = false;
            if (/s$/i.test(expr) && sec >= 60) isExpandable = true;
            if (/min$/i.test(expr) && sec >= 3600) isExpandable = true;
            if (/h$/i.test(expr) && sec >= 86400) isExpandable = true;

            if (isExpandable) {
                return { val: fmt(sec, 'normal'), isSingleConversion: true };
            }
            return { err: true, isRedundantSingle: true };
        } catch (e) { return { err: true }; }
    }

    if (!hasOp && !hasUnit) return { err: true };

    try {
        let cleanExpr = preprocess(expr);
        let v = Function("return " + cleanExpr)();
        let mode = hasUnit ? 'normal' : 'pure';
        if (hasUnit && !expr.includes('d')) { mode = 'force_h'; }
        return { val: fmt(v, mode), isPure: !hasUnit };
    } catch (e) { return { err: true }; }
}

function liveCalc() {
    let expr = exprEl.innerText.trim();
    if (!expr) { result(""); return; }
    if (/[+\-×÷]\s*$/.test(expr)) { result(""); return; }

    let resObj = executeEngine(expr);
    if (resObj.err || resObj.isRedundantSingle) { result(""); } else { result(resObj.val); }
}

function calc() {
    let expr = exprEl.innerText.trim();
    if (!expr) return;
    let resObj = executeEngine(expr);
    
    if (resObj.err) {
        if (resObj.isRedundantSingle) return; 
        result("Erro na expressão"); 
        return;
    }
    
    saveToHist(expr, resObj.val);
    exprEl.innerText = resObj.val;
    result("");
    clearOnNextInput = true;
    setCaretPosition(resObj.val.length);
}

function saveToHist(ex, res) {
    let h = JSON.parse(localStorage.getItem("tempo40") || "[]");
    h.unshift(ex + " = " + res);
    localStorage.setItem("tempo40", JSON.stringify(h.slice(0, 100)));
    updateHistView();
}

function toggleHist() {
    let h = JSON.parse(localStorage.getItem("tempo40") || "[]");
    if (!h.length && !isHistOpen) return; 
    isHistOpen = !isHistOpen;
    const pane = document.getElementById("history-pane");
    if (isHistOpen) { pane.classList.add("open"); } else { pane.classList.remove("open"); }
}

function updateHistView() {
    let h = JSON.parse(localStorage.getItem("tempo40") || "[]");
    let container = document.getElementById("history-list");
    let toggleBtn = document.getElementById("toggle-btn");
    
    if (!h.length) { 
        container.innerHTML = ""; 
        toggleBtn.classList.add("disabled");
        if (isHistOpen) toggleHist();
        return; 
    }
    
    toggleBtn.classList.remove("disabled");
    container.innerHTML = h.map(x => {
        let parts = x.split(' = ');
        return `<div class="hist-item" onclick="loadHist('${parts[0]}')"><div class="h-exp">${parts[0]}</div><div class="h-res">=${parts[1]}</div></div>`;
    }).join("");
}

function loadHist(ex) {
    exprEl.innerText = ex;
    result("");
    toggleHist();
    render();
    liveCalc();
    clearOnNextInput = false;
    setCaretPosition(ex.length);
}

function clearHist() { localStorage.removeItem("tempo40"); updateHistView(); }

document.addEventListener("keydown", e => {
    let key = e.key;
    if (/^F[1-9]$|^F1[0-2]$/.test(key)) { e.preventDefault(); return; }
    if (e.altKey && key.toLowerCase() === "h") { e.preventDefault(); toggleHist(); return; }
    if (key === "Escape" && isHistOpen) { e.preventDefault(); toggleHist(); return; }
    if (key.toLowerCase() === "l" && isHistOpen) { e.preventDefault(); clearHist(); return; }

    if (key === "Home" || key === "End" || key === "PageUp" || key === "PageDown") return;
    if (key === "." || key === ",") { e.preventDefault(); addComma(); return; }

    if (e.ctrlKey || e.metaKey || key.startsWith("Arrow") || key === "Shift") return;

    e.preventDefault(); 
    if (key.toLowerCase() === "c") { clearExpr(); return; }
    if (/^[0-9]$/.test(key)) { addNum(key); return; }
    if (key === "%") { addOp("%"); return; }
    if (key === "(") { insertAtCaret("("); return; }
    if (key === ")") { insertAtCaret(")"); return; }
    if (key === "+") { addOp(" + "); return; }
    if (key === "-") { addOp(" - "); return; }
    if (key === "*") { addOp(" × "); return; }
    if (key === "/") { addOp(" ÷ "); return; }
    if (key.toLowerCase() === "h") { addUnit("h"); return; }
    if (key.toLowerCase() === "d") { addUnit("d"); return; }
    if (key.toLowerCase() === "s") { addUnit("s"); return; }
    if (key.toLowerCase() === "m") { addUnit("min"); return; }
    if (key === "Backspace") { back(); return; }
    if (key === "Enter") { calc(); return; }
});

exprEl.addEventListener("paste", e => e.preventDefault());
exprEl.addEventListener("input", () => { render(); liveCalc(); });
exprEl.focus();
updateHistView();
</script>
</body>
</html>
